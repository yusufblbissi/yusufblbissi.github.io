// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((key, val) => {
    setValues((prev) => ({ ...prev, [key]: val }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [key]: val } }, '*');
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel"
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
              paddingTop: compact ? 10 : 0,
              paddingRight: compact ? 6 : 0,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

function TweakColor({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <input type="color" className="twk-swatch" value={value}
             onChange={(e) => onChange(e.target.value)} />
    </div>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

/* ── Animation Helpers ── */
function FadeIn({ children, delay = 0, direction = "up", duration = 0.7, style = {} }) {
  const ref = React.useRef(null);
  const [visible, setVisible] = React.useState(false);
  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const obs = new IntersectionObserver(([e]) => { if (e.isIntersecting) { setVisible(true); obs.disconnect(); } }, { threshold: 0.1 });
    obs.observe(el);
    return () => obs.disconnect();
  }, []);
  const offsets = { up: "translateY(40px)", down: "translateY(-40px)", left: "translateX(40px)", right: "translateX(-40px)", none: "none" };
  return (
    <div ref={ref} style={{
      opacity: visible ? 1 : 0,
      transform: visible ? "none" : offsets[direction],
      transition: `opacity ${duration}s cubic-bezier(.22,1,.36,1) ${delay}s, transform ${duration}s cubic-bezier(.22,1,.36,1) ${delay}s`,
      ...style,
    }}>
      {children}
    </div>
  );
}

function PageTransition({ children, pageKey }) {
  const [display, setDisplay] = React.useState(children);
  const [anim, setAnim] = React.useState("in");
  const prevKey = React.useRef(pageKey);
  React.useEffect(() => {
    if (pageKey !== prevKey.current) {
      setAnim("out");
      const t = setTimeout(() => {
        setDisplay(children);
        setAnim("in");
        prevKey.current = pageKey;
      }, 250);
      return () => clearTimeout(t);
    } else {
      setDisplay(children);
    }
  }, [pageKey, children]);
  return (
    <div style={{
      opacity: anim === "in" ? 1 : 0,
      transform: anim === "in" ? "none" : "translateY(16px)",
      transition: "opacity 0.35s ease, transform 0.35s ease",
    }}>
      {display}
    </div>
  );
}

function useViewport() {
  const getWidth = () => (typeof window === 'undefined' ? 1200 : window.innerWidth);
  const [width, setWidth] = React.useState(getWidth);

  React.useEffect(() => {
    const onResize = () => setWidth(getWidth());
    window.addEventListener('resize', onResize);
    return () => window.removeEventListener('resize', onResize);
  }, []);

  return {
    width,
    isTablet: width <= 960,
    isMobile: width <= 640,
  };
}

            marginTop: 40, fontFamily: THEMES.gallery.fontBody, fontSize: 13,

        </div>
      </div>
    </div>
  );
}

        <FadeIn delay={0} direction="left">
        <div>
          <img src="assets/portrait.jpeg" alt="Yousef Balbisi" style={{
            width: "100%", aspectRatio: "3/4", objectFit: "cover", borderRadius: 4,
          }} />
        </div>
        </FadeIn>
        <FadeIn delay={0.2} direction="right">
        <div>
          <h2 style={{ fontFamily: t.font, fontSize: compact ? 34 : 42, fontWeight: 400, color: t.text, margin: "0 0 8px" }}>About</h2>
          <div style={{ width: 40, height: 2, background: t.accent, marginBottom: 32 }}></div>
          <p style={{ fontFamily: t.fontBody, fontSize: 16, color: t.text, lineHeight: 1.8, margin: "0 0 20px" }}>
            I am Yousef Balbisi, a Palestinian artist born in Syria and raised between worlds. With a Lebanese mother and a life shaped by the landscapes of Damascus, Beirut, and the stories carried across borders, my work is a conversation between memory and presence.
          </p>
          <p style={{ fontFamily: t.fontBody, fontSize: 16, color: t.text, lineHeight: 1.8, margin: "0 0 20px" }}>
            My practice moves between pen and ink — where every line is deliberate and permanent — and acrylic painting, where color becomes emotion. I draw portraits that search for truth in a face, and landscapes that hold the weight of places I carry with me.

          </p>
          <div style={{ fontFamily: t.fontBody, fontSize: 13, color: t.textMuted, textTransform: "uppercase", letterSpacing: 2 }}>
            Beirut, Lebanon

function ShopPage({ theme, setSelectedArt, viewport }) {

  const compact = viewport?.isMobile;
  return (
    <section style={{ marginTop: compact ? 96 : 64, padding: compact ? "48px 18px 64px" : "60px 40px 80px", background: t.bg, minHeight: "100vh" }}>
      <div style={{ maxWidth: 1200, margin: "0 auto" }}>
        <h2 style={{ fontFamily: t.font, fontSize: compact ? 34 : 42, fontWeight: 400, color: t.text, margin: "0 0 12px" }}>Shop</h2>

        <div style={{
          display: "grid",
          gridTemplateColumns: "repeat(auto-fill, minmax(260px, 1fr))",

        }}>

                  <div style={{ fontFamily: t.fontBody, fontSize: 12, color: t.textMuted, marginTop: 2 }}>{art.medium}</div>

}

/* ── Contact Page ── */
function ContactPage({ theme, viewport }) {
  const t = THEMES[theme];
  const compact = viewport?.isMobile;
  const [sent, setSent] = React.useState(false);
  return (
    <section style={{ marginTop: compact ? 96 : 64, padding: compact ? "56px 18px" : "80px 40px", background: t.bg, minHeight: "100vh" }}>
      <div style={{ maxWidth: 600, margin: "0 auto" }}>
        <h2 style={{ fontFamily: t.font, fontSize: compact ? 34 : 42, fontWeight: 400, color: t.text, margin: "0 0 8px" }}>Get in touch</h2>
        <div style={{ width: 40, height: 2, background: t.accent, marginBottom: 16 }}></div>
        <p style={{ fontFamily: t.fontBody, fontSize: 16, color: t.textMuted, margin: "0 0 40px", lineHeight: 1.7 }}>
          For commissions, purchases, or exhibition inquiries — I'd love to hear from you.
        </p>
        {sent ? (
          <div style={{
            padding: 40, textAlign: "center", background: t.cardBg,
            border: `1px solid ${t.cardBorder}`, borderRadius: 4,
          }}>
            <div style={{ fontFamily: t.font, fontSize: 28, color: t.text }}>Thank you</div>
            <p style={{ fontFamily: t.fontBody, fontSize: 15, color: t.textMuted, marginTop: 8 }}>I'll respond within a few days.</p>
          </div>
        ) : (
          <form onSubmit={e => { e.preventDefault(); setSent(true); }} style={{ display: "flex", flexDirection: "column", gap: 20 }}>
            {[{ label: "Name", type: "text" }, { label: "Email", type: "email" }].map(f => (
              <div key={f.label}>
                <label style={{ fontFamily: t.fontBody, fontSize: 12, color: t.textMuted, textTransform: "uppercase", letterSpacing: 2, display: "block", marginBottom: 8 }}>{f.label}</label>
                <input type={f.type} required style={{
                  width: "100%", padding: "12px 16px", background: t.cardBg,
                  border: `1px solid ${t.cardBorder}`, borderRadius: 2,
                  fontFamily: t.fontBody, fontSize: 15, color: t.text,
                  outline: "none", boxSizing: "border-box",
                  transition: "border 0.3s",
                }}
                onFocus={e => e.target.style.borderColor = t.accent}
                onBlur={e => e.target.style.borderColor = t.cardBorder}
                />
              </div>
            ))}
            <div>
              <label style={{ fontFamily: t.fontBody, fontSize: 12, color: t.textMuted, textTransform: "uppercase", letterSpacing: 2, display: "block", marginBottom: 8 }}>Message</label>
              <textarea required rows={5} style={{
                width: "100%", padding: "12px 16px", background: t.cardBg,
                border: `1px solid ${t.cardBorder}`, borderRadius: 2,
                fontFamily: t.fontBody, fontSize: 15, color: t.text,
                outline: "none", resize: "vertical", boxSizing: "border-box",
                transition: "border 0.3s",
              }}
              onFocus={e => e.target.style.borderColor = t.accent}
              onBlur={e => e.target.style.borderColor = t.cardBorder}
              ></textarea>
            </div>
            <button type="submit" style={{
              padding: "14px 32px", background: t.accent, border: "none",
              color: "#fff", cursor: "pointer", borderRadius: 2,
              fontFamily: t.fontBody, fontSize: 13, textTransform: "uppercase",
              letterSpacing: 2, transition: "background 0.3s", alignSelf: compact ? "stretch" : "flex-start",
            }}
            onMouseEnter={e => e.target.style.background = t.accentHover}
            onMouseLeave={e => e.target.style.background = t.accent}
            >
              Send message
            </button>
          </form>
        )}
      </div>
    </section>
  );
}

            <div style={{ fontFamily: t.font, fontSize: 22, color: t.text }}>Yousef Balbisi</div>
            <div style={{ fontFamily: t.fontBody, fontSize: 13, color: t.textMuted, marginTop: 8 }}>

              {routeLinks.map((link) => (

          <div>
            <div style={{ fontFamily: t.fontBody, fontSize: 12, color: t.textMuted, textTransform: "uppercase", letterSpacing: 2.5, marginBottom: 14 }}>
              Social icons
            </div>
            <div style={{ display: "flex", gap: 14, flexWrap: "wrap", alignItems: "center" }}>

                <a key={link.label} href={link.href} target="_blank" rel="noreferrer" aria-label={link.label} style={{

                  display: "inline-flex",
                  alignItems: "center",
                  justifyContent: "center",
                  background: `${link.accent}12`,

                }}>
                  <SocialIcon label={link.label} color={link.accent} />

              ))}
            </div>
            <div style={{ fontFamily: t.fontBody, fontSize: 13, color: t.textMuted, lineHeight: 1.7, marginTop: 18, maxWidth: 320 }}>
              Follow recent works, exhibition notes, and studio updates across the artist's profiles.
            </div>
          </div>
        </div>

        <div style={{ fontFamily: t.fontBody, fontSize: 12, color: t.textMuted, marginTop: 24 }}>
          © 2026 Yousef Balbisi

/* ── Export ── */
Object.assign(window, {
  THEMES, ARTWORKS,
  ArtPlaceholder, Nav, Hero, HomePage, GalleryPage, ArtCard, Lightbox,
  AboutPage, ShopPage, ContactPage, Footer,
});


    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "theme": "gallery"
    }/*EDITMODE-END*/;

    function App() {
      const [tweakValues, setTweak] = useTweaks(TWEAK_DEFAULTS);
      const [page, setPage] = React.useState("home");
      const [selectedArt, setSelectedArt] = React.useState(null);
      const [tweaksOpen, setTweaksOpen] = React.useState(false);
      const viewport = useViewport();

      const theme = tweakValues.theme;
      const t = THEMES[theme];

      React.useEffect(() => { window.scrollTo(0, 0); }, [page]);
      React.useEffect(() => {
        document.body.style.background = t.bg;
        document.body.style.transition = "background 0.5s";
      }, [theme]);

      const renderPage = () => {
        switch (page) {
          case "home": return <HomePage theme={theme} setPage={setPage} viewport={viewport} onToggleTheme={() => setTweak("theme", theme === "dark" ? "gallery" : "dark")} />;
          case "gallery": return <GalleryPage theme={theme} viewport={viewport} setSelectedArt={setSelectedArt} />;
          case "about": return <AboutPage theme={theme} viewport={viewport} />;
          case "shop": return <ShopPage theme={theme} viewport={viewport} setSelectedArt={setSelectedArt} />;
          case "contact": return <ContactPage theme={theme} viewport={viewport} />;
          default: return <HomePage theme={theme} setPage={setPage} viewport={viewport} onToggleTheme={() => setTweak("theme", theme === "dark" ? "gallery" : "dark")} />;
        }
      };

      return (
        <div style={{ minHeight: "100vh", background: t.bg, transition: "background 0.5s" }}>
          <Nav theme={theme} currentPage={page} setPage={setPage} viewport={viewport} />
          <PageTransition pageKey={page}>
            {renderPage()}
          </PageTransition>
          <Footer theme={theme} viewport={viewport} currentPage={page} setPage={setPage} />
          <Lightbox art={selectedArt} theme={theme} onClose={() => setSelectedArt(null)} />

          <TweaksPanel title="Tweaks">
            <TweakSection label="Visual Direction">
              <TweakRadio
                label="Theme"
                value={tweakValues.theme}
                options={[
                  { value: "gallery", label: "Gallery Minimal" },
                  { value: "dark", label: "Dark Immersive" },
                  { value: "warm", label: "Warm Editorial" },
                ]}
                onChange={v => setTweak("theme", v)}
              />
            </TweakSection>
          </TweaksPanel>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
